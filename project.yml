name: LifeTracker
options:
  bundleIdPrefix: com.nikhilesh
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  LifeTrackerCore:
    path: LifeTrackerCore

targets:
  LifeTracker:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LifeTracker
    dependencies:
      - package: LifeTrackerCore
        product: LifeTrackerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikhilesh.lifetracker
        PRODUCT_NAME: LifeTracker
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Used to record your spoken check-ins, transcribed on device."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Used to transcribe your spoken check-ins on device."
